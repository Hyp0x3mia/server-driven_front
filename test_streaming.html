<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE 流式测试 - 实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #60a5fa;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .controls {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .controls label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
        }
        .controls input {
            width: 100%;
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 4px;
            background: #0f172a;
            color: #e2e8f0;
            margin-bottom: 15px;
        }
        .controls button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .controls button:hover {
            background: #2563eb;
        }
        .controls button:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .status {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-info {
            flex: 1;
        }
        .status-item {
            display: inline-block;
            margin-right: 20px;
            color: #94a3b8;
        }
        .status-item strong {
            color: #60a5fa;
        }
        .events {
            background: #1e293b;
            border-radius: 8px;
            overflow: hidden;
        }
        .events-header {
            background: #334155;
            padding: 15px;
            font-weight: bold;
            color: #60a5fa;
        }
        .event {
            padding: 12px 15px;
            border-bottom: 1px solid #334155;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .event:hover {
            background: #334155;
        }
        .event-time {
            color: #94a3b8;
            margin-right: 10px;
        }
        .event-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            margin-right: 10px;
            font-weight: bold;
        }
        .event-type.stage_start { background: #3b82f6; }
        .event-type.stage_complete { background: #22c55e; }
        .event-type.skeleton_ready { background: #f59e0b; }
        .event-type.block_ready { background: #8b5cf6; }
        .event-type.complete { background: #10b981; }
        .event-type.error { background: #ef4444; }
        .event-data {
            color: #cbd5e1;
        }
        .event-data pre {
            margin: 5px 0 0 0;
            padding: 10px;
            background: #0f172a;
            border-radius: 4px;
            overflow-x: auto;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #0f172a;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 SSE 流式内容生成测试</h1>
        <p class="subtitle">实时监控后端事件流，验证渐进式显示功能</p>

        <div class="controls">
            <label>主题 (Topic):</label>
            <input type="text" id="topic" value="机器学习基础教程" placeholder="输入要生成的主题">

            <label>目标受众:</label>
            <input type="text" id="audience" value="初学者" placeholder="例如：初学者、学生、开发者">

            <button id="startBtn" onclick="startGeneration()">🚀 开始生成</button>
            <button id="stopBtn" onclick="stopGeneration()" disabled>⏹️ 停止</button>
            <button onclick="clearEvents()">🗑️ 清空事件</button>
        </div>

        <div class="status">
            <div class="status-info">
                <span class="status-item">状态: <strong id="statusText">未开始</strong></span>
                <span class="status-item">已接收事件: <strong id="eventCount">0</strong></span>
                <span class="status-item">Block 事件: <strong id="blockCount">0</strong></span>
                <span class="status-item">当前阶段: <strong id="currentStage">-</strong></span>
                <span class="status-item">已运行时间: <strong id="elapsedTime">0.0s</strong></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>
        </div>

        <div class="events">
            <div class="events-header">📡 事件流</div>
            <div id="eventsContainer"></div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let eventCount = 0;
        let blockCount = 0;
        let startTime = null;
        let elapsedTime = null;

        function startGeneration() {
            const topic = document.getElementById('topic').value;
            const audience = document.getElementById('audience').value;

            if (!topic) {
                alert('请输入主题');
                return;
            }

            // 清空之前的连接
            if (eventSource) {
                eventSource.close();
            }

            // 重置状态
            eventCount = 0;
            blockCount = 0;
            startTime = Date.now();
            updateStatus('connecting', '连接中...');
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            // 构建请求
            const requestBody = JSON.stringify({
                topic: topic,
                target_audience: audience,
                difficulty: 'intermediate',
                max_sections: 3,  // 减少section数量以加快测试
                include_interactive: true
            });

            console.log('📡 发送请求:', requestBody);

            // 使用 fetch API 获取流式响应
            fetch('http://localhost:8000/generate/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: requestBody
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                updateStatus('running', '生成中...');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                // 更新已运行时间的定时器
                elapsedTime = setInterval(() => {
                    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                    document.getElementById('elapsedTime').textContent = elapsed + 's';
                }, 100);

                function readStream() {
                    reader.read().then(({ done, value }) => {
                        if (done) {
                            console.log('✅ Stream ended');
                            updateStatus('completed', '已完成');
                            finishGeneration();
                            return;
                        }

                        // 解码并添加到缓冲区
                        buffer += decoder.decode(value, { stream: true });

                        // 处理 SSE 事件
                        const lines = buffer.split('\n\n');
                        buffer = lines.pop() || '';

                        for (const line of lines) {
                            if (!line.trim()) continue;

                            // 解析 SSE 格式
                            let eventType = null;
                            let eventData = null;

                            for (const l of line.split('\n')) {
                                if (l.startsWith('event: ')) {
                                    eventType = l.slice(7).trim();
                                } else if (l.startsWith('data: ')) {
                                    try {
                                        eventData = JSON.parse(l.slice(6));
                                    } catch (e) {
                                        console.error('解析 JSON 失败:', l, e);
                                    }
                                }
                            }

                            if (eventData) {
                                handleEvent(eventData);
                            }
                        }

                        // 继续读取
                        readStream();
                    }).catch(error => {
                        console.error('❌ 读取流失败:', error);
                        updateStatus('error', '错误: ' + error.message);
                        finishGeneration();
                    });
                }

                readStream();
            })
            .catch(error => {
                console.error('❌ 请求失败:', error);
                updateStatus('error', '连接失败: ' + error.message);
                finishGeneration();
            });
        }

        function handleEvent(event) {
            eventCount++;
            document.getElementById('eventCount').textContent = eventCount;

            const eventType = event.type || 'unknown';
            const stage = event.stage || '';
            const data = event.data || {};
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

            console.log(`📨 [${elapsed}s] Event #${eventCount}:`, eventType, stage);

            // 更新状态
            if (eventType === 'stage_start') {
                document.getElementById('currentStage').textContent = stage;
            } else if (eventType === 'block_ready') {
                blockCount++;
                document.getElementById('blockCount').textContent = blockCount;

                // 更新进度条
                const progress = data.progress || '';
                if (progress) {
                    const match = progress.match(/(\d+)\/(\d+)/);
                    if (match) {
                        const current = parseInt(match[1]);
                        const total = parseInt(match[2]);
                        const percentage = Math.round((current / total) * 100);
                        document.getElementById('progressFill').style.width = percentage + '%';
                        document.getElementById('progressFill').textContent = progress + ' (' + percentage + '%)';
                    }
                }
            } else if (eventType === 'complete') {
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressFill').textContent = '完成! ✓';
                clearInterval(elapsedTime);
            } else if (eventType === 'error') {
                updateStatus('error', '错误');
                clearInterval(elapsedTime);
            }

            // 添加事件到显示区域
            addEventToDisplay(eventType, stage, data, elapsed);
        }

        function addEventToDisplay(eventType, stage, data, elapsed) {
            const container = document.getElementById('eventsContainer');

            const eventDiv = document.createElement('div');
            eventDiv.className = 'event';

            let dataHtml = '';
            if (eventType === 'skeleton_ready') {
                dataHtml = `<pre>Sections: ${data.sections?.length || 0}, 估算blocks: ${data.estimated_blocks || 0}</pre>`;
            } else if (eventType === 'block_ready') {
                const block = data.block || {};
                dataHtml = `<pre>Block #${data.index + 1}: ${block.type} - ${block.title || '(无标题)'}\n进度: ${data.progress}</pre>`;
            } else if (eventType === 'complete') {
                dataHtml = `<pre>总blocks: ${data.total_blocks}\n保存到: ${data.saved_to}\n生成时间: ${data.generation_time?.toFixed(1)}s</pre>`;
            } else if (eventType === 'error') {
                dataHtml = `<pre style="color: #ef4444;">错误: ${data.error || '未知错误'}</pre>`;
            }

            eventDiv.innerHTML = `
                <span class="event-time">[${elapsed}s]</span>
                <span class="event-type ${eventType}">${eventType}</span>
                <span class="event-data">${stage || ''}${dataHtml}</span>
            `;

            container.insertBefore(eventDiv, container.firstChild);

            // 限制显示的事件数量（保留最新的100个）
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        function stopGeneration() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            finishGeneration();
            updateStatus('stopped', '已停止');
        }

        function finishGeneration() {
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            if (elapsedTime) {
                clearInterval(elapsedTime);
            }
        }

        function updateStatus(state, text) {
            const statusText = document.getElementById('statusText');
            statusText.textContent = text;

            // 根据状态改变颜色
            const colors = {
                'connecting': '#f59e0b',
                'running': '#3b82f6',
                'completed': '#10b981',
                'error': '#ef4444',
                'stopped': '#6b7280'
            };
            statusText.style.color = colors[state] || '#94a3b8';
        }

        function clearEvents() {
            document.getElementById('eventsContainer').innerHTML = '';
            eventCount = 0;
            blockCount = 0;
            document.getElementById('eventCount').textContent = '0';
            document.getElementById('blockCount').textContent = '0';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressFill').textContent = '0%';
            document.getElementById('currentStage').textContent = '-';
            document.getElementById('elapsedTime').textContent = '0.0s';
        }
    </script>
</body>
</html>
